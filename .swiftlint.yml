# mykilOS 6 — Token-Disziplin wird erzwungen, nicht empfohlen.
# Diese Custom-Rules lassen die zwei V5-Sünden gar nicht erst durch den Build.
included:
  - Sources
excluded:
  - Sources/MykilosApp/main.swift   # Akt-0-Ausnahme, in Akt 1 entfernen
  - Sources/MykilosKalkulationsCore # verbatim aus mykilO$$ portiert (vendored),
                                     # wird NICHT umformatiert — externe Daten-Tabellen
                                     # (MaterialLexicon u.a.) sprengen line_length absichtlich.
                                     # Kein SwiftUI → Token-Custom-Rules ohnehin n/a.
  # verbatim portierte GRDB-Lern-Schicht aus mykilO$$ (vendored, nicht umformatiert).
  # Nur diese drei Dateien — eigener Adapter-Code in Kalkulation/ bleibt voll gelintet.
  - Sources/MykilosServices/Kalkulation/LearningDatabase.swift
  - Sources/MykilosServices/Kalkulation/LearningRecords.swift
  - Sources/MykilosServices/Kalkulation/LearningStore.swift
  - Sources/MykilosServices/Kalkulation/CSVParser.swift
  - Sources/MykilosServices/Kalkulation/DeviceCatalog.swift
  - Sources/MykilosServices/Kalkulation/BaselineAnchors.swift

custom_rules:
  no_system_font_in_features:
    name: "Keine .font(.system) — nutze Typo-Tokens"
    regex: '\.font\(\s*\.system'
    match_kinds: [identifier, keyword, typeidentifier]   # nur Code, keine Kommentare
    message: "Direkte System-Schrift verboten. Verwende die Design-Tokens (Akt 1)."
    severity: error
  no_raw_color_in_features:
    name: "Keine Color(red:) — nutze MykColor"
    # Negativer Lookbehind: schließt NSColor(red:) (Token-Infra in Tokens.swift) aus.
    regex: '(?<![A-Za-z])Color\(\s*red\s*:'
    match_kinds: [identifier, typeidentifier]
    message: "Hardcodierte Farben verboten. Verwende MykColor."
    severity: error
  no_hex_color_in_features:
    name: "Keine Color(hex:) — nutze MykColor"
    # Negativer Lookbehind (wie no_raw_color): schließt NSColor(hex:) aus — das ist die
    # dokumentierte PDF-Druck-Ausnahme in MykPDFRenderer.swift (CLAUDE.md). Fängt weiter
    # jedes echte Color(hex: in Feature/Widget-Code hart. init(hex:)-Definition ist kein Call-Site.
    regex: '(?<![A-Za-z])Color\(\s*hex\s*:'
    match_kinds: [identifier, typeidentifier]
    message: "Hardcodierte Hex-Farben verboten. Verwende MykColor."
    severity: error
  no_silent_try:
    name: "Kein verschlucktes try?"
    regex: 'try\?'
    message: "try? verschluckt Fehler. Wirf oder behandle ihn sichtbar (SaveState)."
    severity: warning

# Severity sauber getiert (2026-07-08): die Token-Disziplin (Custom-Rules oben) bleibt hart
# `error` und bricht den Build. Länge/Struktur/Namen sind Debt-WARNUNGEN — lokal sichtbar,
# aber kein Build-Gate. Das ersetzt die kaputte (maschinen-absolute Pfade) Baseline + das
# `--strict`, das alle ~1863 Warnungen fälschlich zu fatal machte. CI lintet non-strict:
# Fehler = hart, Warnungen = getracktes Debt zum Abtragen.
identifier_name:
  min_length: 0          # kurze idiomatische Namen (m, s, i in Closures/Schleifen) sind kein Disziplin-Verstoß
  max_length:
    warning: 60
    error: 100
line_length:
  warning: 140
  error: 2000            # nur absurd lange Zeilen hart; 140 bleibt sichtbare Warnung (viele lange Prompt-Literale)
file_length:
  warning: 500
  error: 6000
type_body_length:
  warning: 400
  error: 6000
function_body_length:
  warning: 100
  error: 6000
type_name:
  min_length: 2
  max_length:
    warning: 40
    error: 90
