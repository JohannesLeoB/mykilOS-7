name: CI
on:
  push:
  pull_request:

jobs:
  build-and-test:
    # 2026-07-05: von macos-14 auf macos-15 gehoben — die ältere Toolchain crashte
    # den Swift-Compiler (error: fatalError) beim Kompilieren von MykilosServices.
    # Der Code wird gegen eine neuere macOS-SDK/Swift-Version entwickelt.
    runs-on: macos-15
    env:
      # 2026-07-05: der CI die gleiche Umgebung wie der Dev-Maschine geben (Berlin/CET,
      # deutsche Locale), damit umgebungsabhängige Tests (Datum-Fälligkeit über
      # Mitternacht, Währungsformat „9,99 €" mit geschütztem Leerzeichen) dasselbe
      # Ergebnis liefern wie lokal. Sauberer wären umgebungsunabhängige Tests
      # (fixe TimeZone/Locale im Code/Test) → eigener Qualitäts-Strang.
      TZ: Europe/Berlin
      LANG: de_DE.UTF-8
      LC_ALL: de_DE.UTF-8
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: SwiftLint (Disziplin-Gate)
        run: |
          brew install swiftlint || true
          # Baseline (2026-07-05): die vorbestehende Lint-Schuld (1787 Verstöße, ganze
          # Codebase) ist in swiftlint-baseline.json eingefroren. Die CI meldet damit nur
          # NEUE Verstöße hart — die Alt-Schuld wird als eigener Strang abgetragen.
          swiftlint lint --strict --baseline swiftlint-baseline.json || (echo "::error::NEUE Lint-Regeln verletzt (Alt-Schuld ist baselined)"; exit 1)
      - name: Build
        run: swift build
      - name: Test (inkl. Cold-Start)
        run: swift test
