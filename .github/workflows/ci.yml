name: CI
on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: SwiftLint (Disziplin-Gate)
        run: |
          brew install swiftlint || true
          swiftlint --strict || (echo "::error::Lint-Regeln verletzt"; exit 1)
      - name: Build
        run: swift build
      - name: Test (inkl. Cold-Start)
        run: swift test
