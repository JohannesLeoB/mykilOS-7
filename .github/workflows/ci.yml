name: CI
on:
  push:
  pull_request:

jobs:
  build-and-test:
    # 2026-07-05: von macos-14 auf macos-15 gehoben — die ältere Toolchain crashte
    # den Swift-Compiler (error: fatalError) beim Kompilieren von MykilosServices.
    # Der Code wird gegen eine neuere macOS-SDK/Swift-Version entwickelt.
    runs-on: macos-15
    env:
      # 2026-07-05: der CI die gleiche Umgebung wie der Dev-Maschine geben (Berlin/CET,
      # deutsche Locale), damit umgebungsabhängige Tests (Datum-Fälligkeit über
      # Mitternacht, Währungsformat „9,99 €" mit geschütztem Leerzeichen) dasselbe
      # Ergebnis liefern wie lokal. Sauberer wären umgebungsunabhängige Tests
      # (fixe TimeZone/Locale im Code/Test) → eigener Qualitäts-Strang.
      TZ: Europe/Berlin
      LANG: de_DE.UTF-8
      LC_ALL: de_DE.UTF-8
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: SwiftLint (Disziplin-Gate)
        run: |
          # Root-Fix 2026-07-08 der monatelang roten CI. Vorher: `--strict --baseline`.
          # Zwei verkettete Fehler: (a) `--strict` machte ALLE ~1863 Style-Warnungen zu fatal;
          # (b) die Baseline-Datei speicherte maschinen-absolute Pfade (file:///Users/johannes...),
          # die auf dem CI-Runner (/Users/runner/work/...) NIE matchen → Baseline unterdrückte dort
          # nichts → CI dauerrot, lokal grün. SwiftLint-Baselines sind grundsätzlich nicht
          # pfad-portabel. Fix: keine Baseline, kein --strict. Die eigentliche Disziplin
          # (Token-Custom-Rules, siehe .swiftlint.yml) ist `severity: error` und bricht den Build
          # hart; Länge/Style/Namen sind dort zu Warnungen getiert (getracktes Debt, kein Gate).
          curl -sSL -o SwiftLint.pkg "https://github.com/realm/SwiftLint/releases/download/0.65.0/SwiftLint.pkg"
          sudo installer -pkg SwiftLint.pkg -target /
          swiftlint version
          swiftlint lint
      - name: Build
        run: swift build
      - name: Test (inkl. Cold-Start)
        run: swift test
